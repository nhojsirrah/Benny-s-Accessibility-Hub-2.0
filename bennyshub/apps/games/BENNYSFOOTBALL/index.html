<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Benny's Football</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: #0a1408;
    height: 100%;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
}
body {
    display: flex;
    justify-content: center;
    align-items: center;
}
#game { line-height: 0; width: 100vw; height: 100vh; }
canvas { display: block; transition: filter 0.25s; }
</style>
</head>
<body>
<div id="game"></div>

<!-- ── Colorblind palette-shift SVG filters ───────────────────────────────
     Applied as CSS filter to the Phaser canvas by applyColorblindFilter().
     Matrices are LMS-space daltonisation corrections that redistribute the
     lost channel so affected hues become distinguishable, not a simulation.
     Sources: Machado et al. (2009) + Lindbloom adaptation.
-->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <!-- Deuteranopia correction (green-weak): redistribute green into red+blue -->
    <filter id="cb-deuteranopia" color-interpolation-filters="linearRGB">
      <feColorMatrix type="matrix" values="
        0.625  0.375  0      0  0
        0.70   0.30   0      0  0
        0      0.30   0.70   0  0
        0      0      0      1  0"/>
    </filter>
    <!-- Protanopia correction (red-weak): redistribute red into green+blue -->
    <filter id="cb-protanopia" color-interpolation-filters="linearRGB">
      <feColorMatrix type="matrix" values="
        0.17   0.83   0      0  0
        0.17   0.83   0      0  0
        0      0.16   0.84   0  0
        0      0      0      1  0"/>
    </filter>
    <!-- Tritanopia correction (blue-yellow): redistribute blue into red+green -->
    <filter id="cb-tritanopia" color-interpolation-filters="linearRGB">
      <feColorMatrix type="matrix" values="
        0.95   0.05   0      0  0
        0      0.43   0.57   0  0
        0      0.43   0.57   0  0
        0      0      0      1  0"/>
    </filter>
  </defs>
</svg>

<!-- Phaser engine -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

<!-- Shared hub accessibility / audio helpers -->
<script src="../../../shared/voice-manager.js" onerror="console.warn('voice-manager.js not loaded')"></script>
<script src="../../../shared/scan-manager.js" onerror="console.warn('scan-manager.js not loaded')"></script>
<script src="../../../shared/scan-core.js" onerror="console.warn('scan-core.js not loaded')"></script>
<script src="../../../shared/ios-audio-fix.js" onerror="console.warn('ios-audio-fix.js not loaded')"></script>
<script src="../../../shared/nav.js" onerror="console.warn('nav.js not loaded')"></script>
<script src="../../../shared/pause-overlay.js" onerror="console.warn('pause-overlay.js not loaded')"></script>

<!-- Game modules -->
<script src="js/constants.js"></script>
<script src="js/audio.js"></script>
<script src="js/season.js"></script>
<script src="js/ui.js"></script>
<script src="js/scenes.js"></script>
<script src="js/game.js"></script>

<script>
window.addEventListener('load', () => {
    // Restore saved colorblind filter as soon as the page loads so it applies
    // before the first frame is rendered (canvas may not exist yet — the helper
    // polls until it does).
    if (typeof colorblindMode === 'function') applyColorblindFilter(colorblindMode());

    // Render the 1000x600 world at a much higher backing resolution so the
    // upscale to the screen stays crisp instead of looking blurry. We size the
    // canvas to the actual device pixels (zoom), then FIT scales it to fit.
    const dpr = window.devicePixelRatio || 1;
    const need = Math.max(window.innerWidth / W, window.innerHeight / H);
    const zoom = Math.min(Math.max(1, Math.ceil(need * dpr)), 4);
    window.__GAME_ZOOM = zoom;

    // Match text render resolution to the supersampled canvas so labels and
    // numbers are sharp too (Phaser text otherwise renders at 1x and scales up).
    const _factoryText = Phaser.GameObjects.GameObjectFactory.prototype.text;
    Phaser.GameObjects.GameObjectFactory.prototype.text = function (x, y, text, style) {
        const obj = _factoryText.call(this, x, y, text, style);
        if (obj && obj.setResolution) obj.setResolution(zoom);
        return obj;
    };

    const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: 'game',
        backgroundColor: '#0a1408',
        render: {
            antialias: true,
            antialiasGL: true,
            roundPixels: false,
            pixelArt: false
        },
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
            zoom: zoom
        },
        scene: [TitleScene, SettingsScene, InstructionsScene, ColorSelectScene, SeasonScene, GameScene, ResultScene]
    };
    window.__footballGame = new Phaser.Game(config);
});
</script>
</body>
</html>
